<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ミカエス — 真ん中タップ・コアループ</title>
<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#F4F1EC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ミカエス">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F4F1EC; --light: #FCFBF8;
    --ink: #2A2622; --ink-mid: #6E665D; --ink-soft: #A49C92;
    --card: #FFFFFF; --line: #ECE7DF;
    --gold: #C5A461; --gold-soft: #E8D9B5;
    --warm: #FF7D5E; --warm-deep: #E85F3F; --warm-tint: #FFEBE3;
  }

  /* ── ダークモード（手動=[data-theme=dark] / OS追従=[data-theme=auto]） ── */
  :root[data-theme="dark"] { color-scheme: dark;
    --paper: #16140F; --light: #1E1B15;
    --ink: #ECE7DD; --ink-mid: #B2A99D; --ink-soft: #7E7568;
    --card: #211E19; --line: #322E27;
    --gold: #CDAE6E; --gold-soft: #4F4631;
    --warm: #FF8666; --warm-deep: #FF9F86; --warm-tint: #3A241D;
  }
  @media (prefers-color-scheme: dark) {
    :root[data-theme="auto"] { color-scheme: dark;
      --paper: #16140F; --light: #1E1B15;
      --ink: #ECE7DD; --ink-mid: #B2A99D; --ink-soft: #7E7568;
      --card: #211E19; --line: #322E27;
      --gold: #CDAE6E; --gold-soft: #4F4631;
      --warm: #FF8666; --warm-deep: #FF9F86; --warm-tint: #3A241D;
    }
  }
  /* ダーク時：墨背景＋白文字のCTAは明るい面＋暗い文字へ（--ink反転で面は明色／文字だけ暗く） */
  :root[data-theme="dark"] .badge, :root[data-theme="dark"] .who-go,
  :root[data-theme="dark"] .shelf-count, :root[data-theme="dark"] .sel-del,
  :root[data-theme="dark"] .shelf-note, :root[data-theme="dark"] .dlg-yes,
  :root[data-theme="dark"] .write-go { color: var(--paper); }
  :root[data-theme="dark"] .sel-dot.on svg path { stroke: var(--paper); }
  :root[data-theme="dark"] .tgl.on .tgl-knob { background: var(--paper); }
  :root[data-theme="dark"] .shelf-item { border-color: var(--line); box-shadow: none; }
  :root[data-theme="dark"] .set-card, :root[data-theme="dark"] .embed-wrap { box-shadow: none; }
  @media (prefers-color-scheme: dark) {
    :root[data-theme="auto"] .badge, :root[data-theme="auto"] .who-go,
    :root[data-theme="auto"] .shelf-count, :root[data-theme="auto"] .sel-del,
    :root[data-theme="auto"] .shelf-note, :root[data-theme="auto"] .dlg-yes,
    :root[data-theme="auto"] .write-go { color: var(--paper); }
    :root[data-theme="auto"] .sel-dot.on svg path { stroke: var(--paper); }
    :root[data-theme="auto"] .tgl.on .tgl-knob { background: var(--paper); }
    :root[data-theme="auto"] .shelf-item { border-color: var(--line); box-shadow: none; }
    :root[data-theme="auto"] .set-card { box-shadow: none; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Zen Kaku Gothic New', sans-serif; color: var(--ink); }
  .page { min-height: 100vh; display: grid; place-items: center; background: #E9E5DE; padding: 28px 16px; }

  /* ── 実機/PWA（bare）: 試作フレーム無しの全画面 ── */
  .page.bare { display: block; padding: 0; background: var(--paper); min-height: 100dvh; }
  .page.bare > .screen {
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── 画面 ─────────────────────────── */
  .screen {
    position: relative; height: 100%; width: 100%;
    display: flex; flex-direction: column; overflow: hidden;
    background: #F7F5F0;
  }
  .beam {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 58% at 50% -14%,
      rgba(255, 255, 252, calc(0.95 * var(--beam, .8))),
      rgba(255, 255, 252, 0) 72%);
  }

  /* ── 上部：情報のみ ─────────────────── */
  .top { position: relative; text-align: center; padding: 60px 24px 0; }
  .brand {
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900;
    font-size: 15px; letter-spacing: 0.38em; text-indent: 0.38em;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .brand-star { color: var(--gold); font-size: 12px; letter-spacing: 0; text-indent: 0; opacity: calc(0.4 + 0.6 * var(--goldA, .8)); }
  .top-sub { margin-top: 7px; font-size: 12px; color: var(--ink-mid); letter-spacing: 0.04em; }
  .top-sub b { font-weight: 700; color: var(--ink); }

  /* ── 中央ステージ ───────────────────── */
  .stage { position: relative; flex: 1; min-height: 0; display: grid; place-items: center; padding: 0 24px; overflow: hidden; }

  .orb {
    position: relative; width: 184px; height: 184px; border-radius: 50%;
    border: 1px solid rgba(197, 164, 97, calc(0.65 * var(--goldA, .8)));
    background: linear-gradient(180deg, #FFFFFF, #FBF8F3);
    box-shadow: 0 26px 52px rgba(42, 38, 34, 0.13), 0 5px 12px rgba(42, 38, 34, 0.06);
    cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    animation:
      orbIn calc(0.45s * var(--spd, 1)) ease both,
      orbBreathe 3.8s ease-in-out calc(0.45s * var(--spd, 1)) infinite;
    transition: transform .15s ease;
    font-family: inherit;
  }
  .orb:active { transform: scale(0.96); }
  .orb-halo {
    position: absolute; inset: -34px; border-radius: 50%; pointer-events: none;
    background: radial-gradient(closest-side, rgba(197, 164, 97, calc(0.30 * var(--goldA, .8))), rgba(197, 164, 97, 0) 72%);
    animation: haloBreathe calc(3.8s) ease-in-out infinite;
  }
  .orb-star { color: var(--gold); font-size: 24px; opacity: calc(0.45 + 0.55 * var(--goldA, .8)); }
  .orb-label { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 21px; letter-spacing: 0.18em; text-indent: 0.18em; }
  .orb-hint { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; }
  @keyframes orbBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.025); } }
  @keyframes orbIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  @keyframes haloBreathe { 0%, 100% { opacity: .7; transform: scale(.96); } 50% { opacity: 1; transform: scale(1.04); } }

  /* ペースト玉の下の直接入力 */
  .idle-wrap { display: flex; flex-direction: column; align-items: center; gap: 30px; }
  .write-form {
    position: relative; width: 264px;
    animation: writeIn calc(0.5s * var(--spd, 1)) ease calc(0.25s * var(--spd, 1)) both;
  }
  .write-input {
    display: block; width: 100%; box-sizing: border-box;
    padding: 12px 42px 12px 16px;
    border: 1px solid rgba(197, 164, 97, calc(0.4 * var(--goldA, .8)));
    border-radius: 19px; resize: none; overflow: hidden;
    background: var(--card);
    font-family: inherit; font-size: 14px; line-height: 1.5; color: var(--ink);
    letter-spacing: 0.03em; outline: none;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .write-input::placeholder { color: var(--ink-soft); letter-spacing: 0.05em; }
  .write-input:focus {
    border-color: rgba(197, 164, 97, calc(0.85 * var(--goldA, .8)));
    box-shadow: 0 10px 24px rgba(42, 38, 34, 0.08);
  }
  .write-go {
    position: absolute; right: 7px; bottom: 7px; width: 30px; height: 30px;
    border: none; border-radius: 50%; cursor: pointer;
    background: var(--ink); color: #fff; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .2s ease, transform .15s ease;
  }
  .write-go:active { transform: scale(0.92); }
  .write-go:disabled { opacity: 0; pointer-events: none; }
  @keyframes writeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* 開いたアイテム */
  .open-wrap { display: flex; flex-direction: column; align-items: center; max-height: 100%; animation: popIn calc(0.4s * var(--spd, 1)) cubic-bezier(.34,1.56,.64,1) both; }
  .question { margin: 0 0 16px; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.02em; }
  .item-card {
    position: relative; width: 280px; background: var(--card);
    border-radius: var(--r, 26px); padding: 22px 22px 18px;
    box-shadow: 0 22px 44px rgba(42, 38, 34, 0.14), 0 4px 10px rgba(42, 38, 34, 0.05);
  }
  .item-card::before {
    content: ""; position: absolute; top: 0; left: 20px; right: 20px; height: 2px;
    border-radius: 2px; opacity: var(--goldA, .8);
    background: linear-gradient(90deg, rgba(197,164,97,0), var(--gold-soft) 30%, var(--gold) 50%, var(--gold-soft) 70%, rgba(197,164,97,0));
  }
  .item-meta { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--ink-soft); }
  .src-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-soft); opacity: .6; }
  .item-title { margin: 8px 0 2px; font-size: 17px; line-height: 1.5; font-weight: 700; text-wrap: pretty;
    display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; }
  .item-url { margin-top: 6px; font-size: 11px; color: var(--ink-soft); word-break: break-all; line-height: 1.6; letter-spacing: .02em;
    display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
  .item-thumb { display: block; width: 100%; max-height: 132px; object-fit: cover; border-radius: 14px; margin: 2px 0 4px; background: var(--line); }
  .item-text { margin: 10px 0 2px; font-size: 13.5px; line-height: 1.85; text-wrap: pretty; }
  .item-img { display: block; width: 100%; max-height: 150px; object-fit: cover; border-radius: calc(var(--r, 26px) * 0.55); margin: 10px 0 2px; }

  /* サービスバッジ（カード左上） */
  .svc-badge {
    position: absolute; top: -13px; left: -13px; width: 36px; height: 36px; border-radius: 50%;
    background: var(--card); border: 1px solid rgba(197, 164, 97, calc(0.55 * var(--goldA, .8)));
    color: var(--ink); display: grid; place-items: center; z-index: 2;
    box-shadow: 0 8px 16px rgba(42, 38, 34, 0.12);
  }
  .svc-inline { display: grid; place-items: center; color: var(--ink-mid); }

  /* Markdownミニプレビュー */
  .md-prev { margin: 10px 0 2px; display: flex; flex-direction: column; gap: 6px; }
  .md-h { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: .02em; }
  .md-li { display: flex; align-items: baseline; gap: 8px; font-size: 12.5px; line-height: 1.6; }
  .md-dot { flex: none; width: 5px; height: 5px; border-radius: 50%; background: var(--ink-soft); transform: translateY(-2px); }
  .md-num { flex: none; font-weight: 700; color: var(--ink-mid); font-size: 11.5px; }
  .md-p { font-size: 12.5px; line-height: 1.7; color: var(--ink-mid); }
  .must-one { margin: 16px 0 0; font-size: 12px; color: var(--ink-mid); letter-spacing: 0.04em; }

  /* 湯気 */
  .steam { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
  .steam i {
    width: 3px; height: 16px; border-radius: 3px; background: var(--warm);
    animation: steamRise calc(1.6s * var(--spd, 1)) ease-in-out infinite;
  }
  .steam i:nth-child(2) { animation-delay: calc(0.35s * var(--spd, 1)); height: 20px; }
  .steam i:nth-child(3) { animation-delay: calc(0.7s * var(--spd, 1)); }
  .steam-warm i { opacity: .45; }
  @keyframes steamRise {
    0% { transform: translateY(4px) scaleY(.6); opacity: 0; }
    40% { opacity: .9; }
    100% { transform: translateY(-8px) scaleY(1.1); opacity: 0; }
  }
  @keyframes popIn { from { transform: scale(.86) translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* トースト */
  .toast {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid rgba(197,164,97, calc(0.5 * var(--goldA, .8)));
    border-radius: 999px; padding: 12px 22px;
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 15px;
    box-shadow: 0 16px 32px rgba(42,38,34,.12);
    animation:
      popIn calc(0.35s * var(--spd, 1)) cubic-bezier(.34,1.56,.64,1) both,
      toastOut calc(0.35s * var(--spd, 1)) ease calc(0.6s * var(--spd, 1)) forwards;
  }
  @keyframes toastOut { to { opacity: 0; transform: translateY(-6px) scale(.97); } }
  .toast-check { color: var(--gold); font-size: 16px; }

  /* 空 = ぜんぶ拾えた */
  .empty { position: relative; display: flex; flex-direction: column; align-items: center; animation: popIn calc(.45s * var(--spd,1)) ease both; }
  .empty-halo {
    position: absolute; top: -54px; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(197,164,97, calc(0.32 * var(--goldA,.8))), rgba(197,164,97,0) 72%);
    animation: haloBreathe calc(3.4s) ease-in-out infinite;
  }
  .empty-star { color: var(--gold); font-size: 32px; position: relative; }
  .empty-line { position: relative; margin: 14px 0 0; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: .04em; }
  .again {
    position: relative; margin-top: 22px; border: 1px solid var(--line); background: var(--card);
    border-radius: 999px; padding: 9px 20px; font-family: inherit; font-size: 12.5px; color: var(--ink-mid);
    cursor: pointer; box-shadow: 0 6px 14px rgba(42,38,34,.07);
  }

  /* ── 下部：親指圏 ───────────────────── */
  .verbs-zone { position: relative; padding: 0 14px 16px; display: flex; flex-direction: column; align-items: center; }
  .verbs { display: flex; gap: 9px; justify-content: center; align-items: flex-end; padding-top: 26px; }
  .verb {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: none; border: none; padding: 0; cursor: pointer; font-family: inherit;
    opacity: .32; transition: opacity .25s ease, transform .25s ease; color: var(--ink);
  }
  .verbs.on .verb { opacity: 1; }
  .verbs.nav .verb { opacity: .8; cursor: pointer; }
  .verbs.nav .verb:active .verb-circle { transform: scale(.9); }
  .verb:disabled { cursor: default; }
  .verb-circle {
    position: relative; width: 54px; height: 54px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--line);
    display: grid; place-items: center;
    box-shadow: 0 10px 22px rgba(42, 38, 34, 0.10), 0 2px 5px rgba(42,38,34,.05);
    transition: transform .12s ease, box-shadow .25s ease;
  }
  .verbs.on .verb:active .verb-circle { transform: scale(.9); }
  .verb.pulse .verb-circle { animation: verbPulse calc(.6s * var(--spd,1)) cubic-bezier(.34,1.56,.64,1); border-color: rgba(197,164,97, calc(0.8 * var(--goldA,.8))); }
  @keyframes verbPulse { 0% { transform: scale(1); } 40% { transform: scale(1.22); } 100% { transform: scale(1); } }
  .verb-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em; }
  .badge {
    position: absolute; top: -3px; right: -3px; min-width: 17px; height: 17px;
    border-radius: 999px; background: var(--ink); color: #fff;
    font-size: 10px; font-weight: 700; display: grid; place-items: center; padding: 0 4px;
  }
  .discard {
    margin-top: 13px; background: none; border: none; font-family: inherit; cursor: pointer;
    font-size: 12px; color: var(--ink-soft); letter-spacing: .05em;
    text-decoration: underline dotted; text-underline-offset: 4px;
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
  }
  .discard.on { opacity: 1; pointer-events: auto; }
  .zone-hint {
    margin: 13px 0 0; font-size: 11px; color: var(--ink-soft); letter-spacing: .06em;
    opacity: 0; transition: opacity .25s ease; min-height: 16px;
  }
  .zone-hint.on { opacity: .85; }

  /* ── 誰に見せる？ポップアップ ─────────── */
  .who-card {
    position: relative; width: 280px; background: var(--card);
    border-radius: var(--r, 26px); padding: 24px 22px 22px; text-align: center;
    box-shadow: 0 22px 44px rgba(42, 38, 34, 0.16), 0 4px 10px rgba(42, 38, 34, 0.05);
    border: 1px solid rgba(197,164,97, calc(0.45 * var(--goldA, .8)));
  }
  .who-q { margin: 0; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: .04em; }
  .who-item {
    margin: 9px 0 16px; font-size: 12px; color: var(--ink-soft); line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .who-form { display: flex; gap: 8px; }
  .who-input {
    flex: 1; min-width: 0; border: 1px solid var(--line); background: #FDFCFA;
    border-radius: 999px; padding: 12px 16px; font-family: inherit; font-size: 14px;
    color: var(--ink); outline: none; letter-spacing: .03em;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .who-input::placeholder { color: var(--ink-soft); }
  .who-input:focus {
    border-color: var(--gold-soft);
    box-shadow: 0 0 0 3px rgba(197, 164, 97, calc(0.18 * var(--goldA, .8)));
  }
  .who-go {
    border: none; background: var(--ink); color: #fff; border-radius: 999px;
    padding: 12px 18px; font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .06em; cursor: pointer; transition: opacity .15s ease, transform .12s ease;
  }
  .who-go:disabled { opacity: .3; cursor: default; }
  .who-go:not(:disabled):active { transform: scale(.94); }
  .who-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .who-count { font-size: 10.5px; color: var(--ink-soft); letter-spacing: .08em; }
  .who-skip {
    background: none; border: none; font-family: inherit; cursor: pointer;
    font-size: 11.5px; color: var(--ink-soft); letter-spacing: .05em;
    text-decoration: underline dotted; text-underline-offset: 4px; padding: 4px 2px;
  }

  /* ── 棚ページ（出口画面） ─────────────── */
  .shelf {
    position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column;
    background: #F7F5F0; animation: shelfIn calc(.32s * var(--spd, 1)) cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes shelfIn { from { transform: translateY(28px); opacity: 0; } to { transform: none; opacity: 1; } }
  .shelf-head { position: relative; padding: 60px 20px 14px; text-align: center; border-bottom: 1px solid var(--line); }
  .shelf-title-wrap { display: flex; align-items: center; justify-content: center; gap: 7px; padding-top: 6px; }
  .shelf-icon { color: var(--ink); display: grid; place-items: center; }
  .shelf-title { margin: 0; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: .1em; }
  .shelf-count {
    min-width: 19px; height: 19px; border-radius: 999px; background: var(--ink); color: #fff;
    font-size: 11px; font-weight: 700; display: grid; place-items: center; padding: 0 5px;
  }
  .shelf-sub { margin: 6px 0 0; font-size: 11.5px; color: var(--ink-soft); letter-spacing: .05em; }
  .shelf-hint { margin: 5px 0 0; font-size: 10px; color: var(--ink-soft); letter-spacing: .08em; opacity: .8; }
  .shelf-list { flex: 1; overflow-y: auto; padding: 18px 20px 28px; display: flex; flex-direction: column; gap: 11px; }
  .shelf-item {
    display: block; width: 100%; text-align: left; border: 1.5px solid transparent;
    font-family: inherit; color: var(--ink); cursor: pointer; position: relative;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    background: var(--card); border-radius: calc(var(--r, 26px) * 0.65);
    padding: 14px 16px; box-shadow: 0 8px 18px rgba(42,38,34,.07), 0 2px 5px rgba(42,38,34,.04);
    animation: popIn calc(.3s * var(--spd,1)) ease both;
    transition: transform .12s ease, border-color .15s ease;
  }
  .shelf-item.sel-mode:active { transform: scale(.98); }
  .shelf-item.sel-mode { padding-right: 44px; }
  .shelf-item.selected { border-color: var(--ink); }

  /* 埋込みプレイヤー */
  .embed-wrap { position: relative; width: 100%; margin-top: 8px; border-radius: 10px; overflow: hidden; background: #000; }
  .embed-wrap.embed-youtube { aspect-ratio: 16 / 9; }
  .embed-wrap iframe { display: block; width: 100%; height: 100%; border: 0; }
  .embed-spotify, .embed-applemusic, .embed-soundcloud { background: transparent; }

  /* タイトル（タップで外部リンク／コピー） */
  .shelf-item-title-btn {
    display: flex; align-items: flex-start; gap: 6px; width: 100%;
    background: none; border: 0; padding: 0; margin-top: 6px; text-align: left;
    font-family: inherit; color: var(--ink); cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .shelf-item-title-btn:active { opacity: .55; }
  .shelf-item-title-btn .shelf-item-title { margin-top: 0; flex: 1; min-width: 0; }
  .open-ext { flex: none; font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

  /* 選択モード：オーバーレイで埋込み操作を遮りタップ＝選択 */
  .sel-overlay { position: absolute; inset: 0; z-index: 5; background: none; border: 0; cursor: pointer; padding: 0; }
  .sel-dot {
    position: absolute; top: 50%; right: 14px; transform: translateY(-50%);
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--ink-soft); background: #FDFCFA;
    display: grid; place-items: center; transition: background .15s ease, border-color .15s ease;
  }
  .sel-dot svg { opacity: 0; transition: opacity .15s ease; }
  .sel-dot.on { background: var(--ink); border-color: var(--ink); }
  .sel-dot.on svg { opacity: 1; }
  .shelf-item-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-soft); }
  .shelf-item-title { margin-top: 5px; font-size: 13.5px; font-weight: 700; line-height: 1.5; text-wrap: pretty; }
  .shelf-thumb { display: block; width: 100%; max-height: 84px; object-fit: cover; border-radius: 10px; margin-top: 7px; }
  .who-tag {
    margin-left: auto; font-size: 10px; font-weight: 700; color: var(--ink-mid);
    border: 1px solid var(--gold-soft); border-radius: 999px; padding: 2px 8px; background: #FDFBF6;
  }
  .shelf-empty { text-align: center; margin-top: 64px; color: var(--ink-soft); }
  .shelf-empty-star { color: var(--gold); font-size: 22px; opacity: calc(0.45 + 0.55 * var(--goldA, .8)); }
  .shelf-empty p { margin: 12px 0 0; font-size: 12.5px; line-height: 1.9; letter-spacing: .04em; }

  /* ホームへ戻るボタン（親指圏） */
  .shelf-foot {
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    padding: 10px 0 42px;
  }
  .home-orb {
    position: relative; width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid rgba(197, 164, 97, calc(0.65 * var(--goldA, .8)));
    background: linear-gradient(180deg, #FFFFFF, #FBF8F3);
    box-shadow: 0 14px 28px rgba(42, 38, 34, 0.13), 0 3px 8px rgba(42, 38, 34, 0.06);
    color: var(--ink); cursor: pointer; display: grid; place-items: center;
    transition: transform .12s ease;
  }
  .home-orb:active { transform: scale(.92); }
  .home-orb svg { position: relative; }
  .home-halo {
    position: absolute; inset: -16px; border-radius: 50%; pointer-events: none;
    background: radial-gradient(closest-side, rgba(197, 164, 97, calc(0.26 * var(--goldA, .8))), rgba(197, 164, 97, 0) 72%);
    animation: haloBreathe 3.8s ease-in-out infinite;
  }
  .home-label { font-size: 10.5px; color: var(--ink-soft); letter-spacing: .14em; text-indent: .14em; }

  /* 選択モードのアクションバー（親指圏） */
  .sel-bar {
    display: flex; align-items: center; justify-content: center; gap: 9px;
    padding: 12px 16px 44px;
  }
  .sel-all, .sel-cancel {
    border: 1px solid var(--line); background: var(--card); border-radius: 999px;
    padding: 11px 16px; font-family: inherit; font-size: 12.5px; font-weight: 700;
    color: var(--ink-mid); cursor: pointer; letter-spacing: .04em;
    box-shadow: 0 4px 10px rgba(42,38,34,.05);
  }
  .sel-cancel { border-color: transparent; box-shadow: none; background: none; text-decoration: underline dotted; text-underline-offset: 4px; color: var(--ink-soft); }
  .sel-del {
    border: none; background: var(--ink); color: #fff; border-radius: 999px;
    padding: 12px 20px; font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .05em; cursor: pointer; transition: opacity .15s ease, transform .12s ease;
    box-shadow: 0 10px 20px rgba(42,38,34,.18);
  }
  .sel-del:disabled { opacity: .3; cursor: default; box-shadow: none; }
  .sel-del:not(:disabled):active { transform: scale(.95); }
  .sel-all:active { transform: scale(.95); }

  /* 選択バー2段（上=補助 / 下=主操作）。4アクションでも崩れない */
  .sel-bar-2 { flex-direction: column; align-items: stretch; gap: 10px; }
  .sel-bar-top { display: flex; align-items: center; justify-content: space-between; }
  .sel-bar-main { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .sel-bar-main .sel-del { padding: 12px 16px; }
  .sel-move {
    border: 1px solid var(--ink); background: var(--card); color: var(--ink); border-radius: 999px;
    padding: 12px 16px; font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .05em; cursor: pointer; transition: opacity .15s ease, transform .12s ease;
    box-shadow: 0 4px 10px rgba(42,38,34,.06);
  }
  .sel-move:disabled { opacity: .3; cursor: default; box-shadow: none; }
  .sel-move:not(:disabled):active { transform: scale(.95); }

  /* 棚内ミニ通知（コピーしたなど） */
  .shelf-note {
    position: absolute; bottom: 124px; left: 16px; right: 16px;
    margin: 0 auto; width: max-content; max-width: calc(100% - 32px); transform: none;
    background: var(--ink); color: #fff; border-radius: 18px; padding: 10px 18px;
    font-size: 12px; font-weight: 700; letter-spacing: .06em;
    white-space: normal; text-align: center; line-height: 1.55; word-break: break-word;
    box-shadow: 0 12px 24px rgba(42,38,34,.22); z-index: 8;
    animation: popIn calc(.25s * var(--spd,1)) ease both;
  }


  /* 画像の全画面ビューア */
  .viewer {
    position: absolute; inset: 0; z-index: 60; display: grid; place-items: center;
    background: rgba(42,38,34,.92); padding: 24px;
    padding-top: calc(24px + env(safe-area-inset-top)); padding-bottom: calc(24px + env(safe-area-inset-bottom));
    animation: viewerIn .22s ease both; cursor: zoom-out;
  }
  .viewer-img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5); animation: viewerImgIn .28s cubic-bezier(.22,1,.36,1) both; }
  .viewer-close {
    position: absolute; top: calc(14px + env(safe-area-inset-top)); right: 16px;
    width: 38px; height: 38px; border-radius: 50%; border: 0; cursor: pointer;
    background: rgba(255,255,255,.14); color: #fff; font-size: 22px; line-height: 1;
    display: grid; place-items: center; backdrop-filter: blur(4px);
  }
  .viewer-close:active { transform: scale(.92); }
  @keyframes viewerIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes viewerImgIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }

  /* 削除確認ダイアログ */
  .dialog-dim {
    position: absolute; inset: 0; z-index: 40; display: grid; place-items: center;
    background: rgba(42, 38, 34, 0.28);
    animation: fadeIn .2s ease both;
  }
  .dialog {
    width: 270px; background: var(--card); border-radius: var(--r, 26px);
    padding: 24px 22px 18px; text-align: center;
    box-shadow: 0 30px 60px rgba(42,38,34,.3);
    border-top: 1px solid rgba(197,164,97, calc(0.55 * var(--goldA, .8)));
    animation: popIn calc(.28s * var(--spd,1)) cubic-bezier(.34,1.56,.64,1) both;
  }
  .dialog-t { margin: 0; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: .04em; }
  .dialog-s { margin: 8px 0 18px; font-size: 12px; color: var(--ink-soft); letter-spacing: .04em; }
  .dialog-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .dlg-no, .dlg-yes { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dlg-no {
    border: 1px solid var(--line); background: #FDFCFA; border-radius: 999px;
    padding: 12px 8px; font-family: inherit; font-size: 13px; font-weight: 700;
    color: var(--ink-mid); cursor: pointer;
  }
  .dlg-yes {
    border: none; background: var(--ink); color: #fff; border-radius: 999px;
    padding: 12px 8px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .dlg-no:active, .dlg-yes:active { transform: scale(.95); }

  /* ── 設定画面 ───────────────────── */
  .gear-btn {
    position: absolute; top: 54px; right: 14px; width: 44px; height: 44px;
    display: grid; place-items: center; background: none; border: none;
    color: var(--ink-soft); cursor: pointer; transition: color .15s ease, transform .15s ease;
  }
  .gear-btn:active { transform: rotate(30deg) scale(.92); color: var(--ink-mid); }
  .search-btn {
    position: absolute; top: 54px; left: 14px; width: 44px; height: 44px;
    display: grid; place-items: center; background: none; border: none;
    color: var(--ink-soft); cursor: pointer; transition: color .15s ease, transform .15s ease;
  }
  .search-btn:active { transform: scale(.92); color: var(--warm); }
  .moya-dim { position: absolute; inset: 0; background: rgba(42,38,34,.32); display: grid; place-items: start center; padding-top: 64px; z-index: 60; animation: dim-in .2s ease; }
  .moya { width: min(92%, 360px); max-height: 78%; overflow-y: auto; background: var(--light); border-top: 2px solid var(--gold-soft); border-radius: 20px; padding: 18px 18px 14px; box-shadow: 0 18px 50px rgba(0,0,0,.18); }
  .moya-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .moya-star { color: var(--gold); font-size: 16px; }
  .moya-title { margin: 0; flex: 1; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: .04em; }
  .moya-x { background: none; border: none; font-size: 22px; color: var(--ink-soft); cursor: pointer; line-height: 1; padding: 0 4px; }
  .moya-lead { margin: 0 0 12px; font-size: 12px; color: var(--ink-soft); letter-spacing: .03em; }
  .moya-inputrow { display: flex; gap: 8px; }
  .moya-input { flex: 1; border: 1px solid var(--line); border-radius: 999px; padding: 11px 15px; font-family: inherit; font-size: 14px; color: var(--ink); background: #fff; }
  .moya-input:focus { outline: none; border-color: var(--warm); }
  .moya-go { border: none; background: linear-gradient(180deg, #FF8C6F, var(--warm)); color: #fff; border-radius: 999px; padding: 0 18px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .moya-go:disabled { opacity: .6; }
  .moya-err { font-size: 12px; color: var(--warm-deep); margin: 10px 0 0; }
  .moya-note { font-size: 12px; color: var(--ink-soft); margin: 14px 2px; text-align: center; }
  .moya-results { margin-top: 6px; }
  .moya-hit { display: block; width: 100%; text-align: left; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; margin-top: 9px; cursor: pointer; }
  .moya-hit:active { transform: scale(.985); }
  .moya-hit-title { display: block; font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: .02em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .moya-hit-meta { display: block; font-size: 11px; color: var(--gold); margin-top: 4px; letter-spacing: .02em; }
  .moya-priv { font-size: 10px; color: var(--ink-soft); margin: 14px 2px 2px; line-height: 1.5; }

  .set-list { gap: 16px; padding-bottom: 16px; }
  .set-group { display: flex; flex-direction: column; gap: 7px; }
  .set-group-t {
    margin: 0 0 0 6px; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700;
    font-size: 12px; letter-spacing: .12em; color: var(--ink-mid);
  }
  .set-card {
    background: var(--card); border-radius: calc(var(--r, 26px) * 0.65);
    box-shadow: 0 8px 18px rgba(42,38,34,.07), 0 2px 5px rgba(42,38,34,.04);
    overflow: hidden;
  }
  .set-card > * + * { border-top: 1px solid var(--line); }
  .set-row {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 13px 16px; text-align: left; background: none; border: none;
    font-family: inherit; color: var(--ink);
  }
  .set-row.tappable { cursor: pointer; }
  .set-row.tappable:active { background: #FBF9F5; }
  .set-row-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .set-row-label { display: flex; align-items: center; gap: 7px; font-size: 13.5px; font-weight: 700; letter-spacing: .02em; }
  .set-row-sub { font-size: 11px; color: var(--ink-soft); letter-spacing: .03em; line-height: 1.5; }
  .set-row-right { flex: none; display: grid; place-items: center; }
  .set-row.locked .set-row-label { color: var(--ink-mid); }
  .lock-ico { color: var(--gold); display: grid; place-items: center; opacity: calc(0.5 + 0.5 * var(--goldA, .8)); }
  .free-badge {
    font-size: 9.5px; font-weight: 700; letter-spacing: .08em; color: var(--ink-mid);
    border: 1px solid var(--gold-soft); border-radius: 999px; padding: 1.5px 7px; background: #FDFBF6;
  }
  .val-chip {
    font-size: 11.5px; font-weight: 700; color: var(--ink-mid); letter-spacing: .03em;
    background: #F4F1EB; border-radius: 999px; padding: 5px 11px; white-space: nowrap;
  }
  .val-chip.dim { background: none; color: var(--ink-soft); font-weight: 500; }
  .val-chip.warn { color: var(--warm-deep); background: var(--warm-tint); }
  .up-btn {
    border: 1px solid rgba(197, 164, 97, calc(0.7 * var(--goldA, .8)));
    background: linear-gradient(180deg, #FFFDF8, #FAF5EA); color: var(--ink);
    border-radius: 999px; padding: 8px 13px; font-family: inherit; font-size: 11.5px;
    font-weight: 700; letter-spacing: .04em; cursor: pointer;
    box-shadow: 0 4px 10px rgba(197, 164, 97, .18);
  }
  .up-btn:active { transform: scale(.95); }

  /* トグル */
  .tgl {
    width: 46px; height: 28px; border-radius: 999px; border: none; cursor: pointer;
    background: #E5E0D7; position: relative; transition: background .2s ease; padding: 0;
  }
  .tgl.on { background: var(--ink); }
  .tgl-knob {
    position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 5px rgba(42,38,34,.25);
    transition: transform .2s cubic-bezier(.34,1.56,.64,1);
  }
  .tgl.on .tgl-knob { transform: translateX(18px); }

  /* 折りたたみ */
  .fold-head {
    display: flex; align-items: center; gap: 9px; width: 100%;
    background: none; border: none; padding: 9px 6px; cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 12.5px;
    letter-spacing: .1em; color: var(--ink-mid); text-align: left;
  }
  .fold-arr { color: var(--ink-soft); transition: transform .2s ease; }
  .fold-arr.open { transform: rotate(90deg); }

  /* 表示＞神聖トーンスライダー */
  .tone-row { padding-top: 14px; padding-bottom: 14px; }
  .tone-slider { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .tone-end { font-size: 11px; color: var(--ink-soft); }
  .tone-slider input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 3px; border-radius: 3px;
    background: linear-gradient(90deg, #EDE8DF, var(--gold)); outline: none;
  }
  .tone-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: #fff; border: 1px solid var(--gold-soft); box-shadow: 0 2px 6px rgba(42,38,34,.2); cursor: pointer;
  }

  /* 占い通知プレビュー（iOSバナー風） */
  .notif {
    position: absolute; top: 58px; left: 12px; right: 12px; z-index: 45;
    display: flex; align-items: center; gap: 11px;
    background: rgba(252, 251, 248, .96); border: 1px solid var(--line);
    border-radius: 20px; padding: 12px 15px;
    box-shadow: 0 18px 36px rgba(42,38,34,.22);
    animation: notifIn calc(.4s * var(--spd, 1)) cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes notifIn { from { transform: translateY(-90px); opacity: 0; } to { transform: none; opacity: 1; } }
  .notif-ico {
    flex: none; width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
    background: linear-gradient(180deg, #FFFFFF, #F6F0E2); border: 1px solid var(--gold-soft);
    color: var(--gold); font-size: 16px;
  }
  .notif-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .notif-t { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; color: var(--ink-soft); }
  .notif-x { font-size: 12.5px; font-weight: 700; line-height: 1.55; letter-spacing: .02em; }

  /* プレミアムシート */
  .dialog.prem { border-top-width: 2px; }
  .prem-star { color: var(--gold); font-size: 22px; display: block; margin-bottom: 6px; }
  .dlg-yes.gold {
    background: linear-gradient(180deg, #D8B873, #C5A461); color: #fff;
  }
  .prem-price { margin: 2px 0 16px; font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: .04em; }
  .prem-price-sub { display: block; font-size: 11px; font-weight: 400; color: var(--ink-soft); margin-top: 3px; }
  .prem-auth-lead { font-size: 12px; color: var(--ink-mid); letter-spacing: .04em; line-height: 1.7; margin: 0 0 14px; }
  .gbtn-wrap { display: flex; justify-content: center; min-height: 44px; margin-bottom: 14px; }
  .prem-auth-busy { font-size: 12px; color: var(--ink-soft); margin: 0 0 12px; }
  .prem-auth-ok { font-size: 13px; font-weight: 700; color: var(--gold); margin: 0 0 16px; letter-spacing: .03em; word-break: break-all; }
  .prem-actions { display: flex; flex-direction: column; gap: 9px; }
  .prem-actions .dlg-yes { width: 100%; }
  .dlg-logout {
    border: 1px solid #F0D2CD; background: #FCEAE7; color: #C75D4E;
    border-radius: 999px; padding: 11px 8px; font-family: inherit;
    font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .dlg-logout:active { transform: scale(.95); }
  .plan-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--paper); border-radius: 999px; padding: 4px; }
  .pt-btn { border: none; background: transparent; border-radius: 999px; padding: 9px 6px; font-family: inherit; font-size: 12px; font-weight: 700; color: var(--ink-soft); cursor: pointer; transition: background .15s; }
  .pt-btn.on { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .prem-active-note { font-size: 12px; color: var(--gold); font-weight: 700; margin: 0 0 4px; letter-spacing: .03em; }
  .val-chip.gold-chip { color: var(--gold); border-color: var(--gold-soft); }

  /* 横断インポート：棚選択 */
  .bm-choices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin: 8px 0 2px; }
  .bm-choice { border: 1px solid var(--line); background: var(--card); border-radius: 12px; padding: 12px 6px;
    font-family: inherit; font-weight: 700; font-size: 13px; color: var(--ink); cursor: pointer; transition: transform .12s ease; }
  .bm-choice:active { transform: scale(.94); }

  /* ── 中央アニメーション共通 ─────────────── */
  .anim { position: relative; display: grid; place-items: center; width: 220px; height: 220px; }

  /* ミル：目がひらく → まばたき */
  .anim-miru .blink-g { transform-box: fill-box; transform-origin: center; animation: eyeBlink calc(.3s * var(--spd,1)) ease calc(1s * var(--spd,1)) both; }
  .anim-miru .eye-draw {
    fill: none; stroke: var(--ink); stroke-width: 3.5; stroke-linecap: round;
    stroke-dasharray: 340; stroke-dashoffset: 340;
    animation: eyeDraw calc(.55s * var(--spd,1)) ease-out forwards;
  }
  .anim-miru .iris-in {
    fill: var(--ink); transform-box: fill-box; transform-origin: center;
    animation: irisIn calc(.45s * var(--spd,1)) cubic-bezier(.34,1.56,.64,1) calc(.3s * var(--spd,1)) both;
  }
  .anim-miru .glint { fill: #fff; animation: fadeIn calc(.2s * var(--spd,1)) ease calc(.55s * var(--spd,1)) both; }
  @keyframes eyeDraw { to { stroke-dashoffset: 0; } }
  @keyframes irisIn { 0% { transform: scale(0); } 70% { transform: scale(1.25); } 100% { transform: scale(1); } }
  @keyframes eyeBlink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.07); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* キク：波紋 + イコライザ */
  .anim-kiku .ripple {
    position: absolute; width: 70px; height: 70px; border-radius: 50%;
    border: 2px solid rgba(42, 38, 34, 0.45);
    animation: rippleOut calc(1.2s * var(--spd,1)) ease-out infinite;
  }
  .anim-kiku .r2 { animation-delay: calc(.3s * var(--spd,1)); }
  .anim-kiku .r3 { animation-delay: calc(.6s * var(--spd,1)); }
  @keyframes rippleOut { 0% { transform: scale(.5); opacity: 0; } 15% { opacity: .8; } 100% { transform: scale(2.6); opacity: 0; } }
  .anim-kiku .eq { display: flex; gap: 6px; align-items: center; height: 40px; }
  .anim-kiku .eq span {
    width: 5px; height: 34px; border-radius: 3px; background: var(--ink);
    transform-origin: center; animation: eqBounce calc(.5s * var(--spd,1)) ease-in-out infinite alternate;
  }
  .anim-kiku .eq span:nth-child(1) { animation-delay: 0s; }

  /* スキ：ハートがはねる */
  .anim-suki .heart-pop path { fill: #fff; stroke: var(--ink); stroke-width: 5; stroke-linejoin: round; }
  .anim-suki .heart-pop {
    transform-origin: center; overflow: visible;
    animation: heartPop calc(.8s * var(--spd,1)) cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes heartPop {
    0% { transform: scale(0); } 45% { transform: scale(1.22); }
    65% { transform: scale(.94); } 82% { transform: scale(1.06); } 100% { transform: scale(1); }
  }
  .anim-suki .sp {

  .anim-suki .s1 { top: 38px; left: 38px; --fx: -18px; --fy: -18px; }
  .anim-suki .s2 { top: 32px; right: 42px; --fx: 18px; --fy: -16px; font-size: 12px; animation-delay: calc(.5s * var(--spd,1)); }
  .anim-suki .s3 { bottom: 52px; left: 30px; --fx: -16px; --fy: 12px; font-size: 11px; animation-delay: calc(.55s * var(--spd,1)); }
  .anim-suki .s4 { bottom: 44px; right: 34px; --fx: 16px; --fy: 14px; animation-delay: calc(.45s * var(--spd,1)); }
  @keyframes spFly {
    0% { transform: translate(0, 0) scale(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translate(var(--fx), var(--fy)) scale(1); opacity: 0; }
  }

    *, *::before, *::after { animation-duration: .01s !important; animation-delay: 0s !important; animation-iteration-count: 1 !important; transition: none !important; }
